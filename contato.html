<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Armarinho São Paulo</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #111, #2c2c2c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container{
            background-color: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: #ffd700;
        }

        .info{
            margin-bottom: 20px;
            background-color: rgba(255,255,255,0.07);
            padding: 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .info:hover{
            transform: scale(1.03);
            background-color: rgba(255,255,255,0.12);
        }

        .info h3{
            margin-bottom: 8px;
            color: #fff;
        }

        a{
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover{
            text-decoration: underline;
        }

        .voltar{
            margin-top: 30px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background-color: #ffd700;
            color: black;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .voltar:hover{
            background-color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contato</h1>

        <div class="info">
            <h3>Telefone Fixo</h3>
            <p>(27) 3722-4271</p>
        </div>

        <div class="info">
            <h3>WhatsApp</h3>
            <p>(27) 99929-4271</p>
        </div>

        <div class="info">
            <h3>Instagram</h3>
            <a href="https://www.instagram.com/armarinhosaopaulo46/" target="_blank">
                @armarinhosaopaulo46
            </a>
        </div>

        <button class="voltar" onclick="window.location.href='index.html'">
            Voltar
        </button>
    </div>

</body>
</html>
