<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | Armarinho São Paulo</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #141414, #2f2f2f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container{
            width: 100%;
            max-width: 700px;
            background-color: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1{
            color: #ffd700;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .carrinho-box{
            background-color: rgba(255,255,255,0.07);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .carrinho-box:hover{
            transform: scale(1.02);
            background-color: rgba(255,255,255,0.12);
        }

        .texto{
            font-size: 1.2rem;
            margin: 10px 0;
        }

        h3{
            color: #ffd700;
            font-size: 1.5rem;
        }

        .botoes{
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .botao{
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background-color: #ffd700;
            color: black;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .botao:hover{
            background-color: white;
            transform: scale(1.05);
        }

        .remover{
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #ffd700;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .remover:hover{
            background-color: white;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Carrinho de Compras</h1>

        <div id="listaCarrinho"></div>

        <div class="botoes">

            <button class="botao" onclick="window.location.href='index.html'">
                Voltar
            </button>

            <button class="botao" onclick="finalizarCompra()">
                Finalizar Compra
            </button>

        </div>

    </div>

<script>

let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

let lista = document.getElementById("listaCarrinho");

function mostrarCarrinho(){

    lista.innerHTML = "";

    if(carrinho.length === 0){

        lista.innerHTML = `
            <div class="carrinho-box">
                <p class="texto">Seu carrinho está vazio.</p>
            </div>
        `;

        return;
    }

    carrinho.forEach((item, index) => {

        lista.innerHTML += `
        
        <div class="carrinho-box">

            <h3>${item.nome}</h3>

            <p class="texto">R$ ${item.preco}</p>

            <button class="remover" onclick="removerItem(${index})">
                Remover
            </button>

        </div>

        `;

    });

}

function removerItem(index){

    carrinho.splice(index, 1);

    localStorage.setItem('carrinho', JSON.stringify(carrinho));

    mostrarCarrinho();

}

function finalizarCompra(){

    if(carrinho.length === 0){

        alert("Seu carrinho está vazio!");

        return;

    }

    let mensagem = "Olá, gostaria de finalizar meu pedido:%0A%0A";

    carrinho.forEach(item => {

        mensagem += "• " + item.nome + " - R$ " + item.preco + "%0A";

    });

    window.open(
        "https://wa.me/5527999294271?text=" + mensagem,
        "_blank"
    );

}

mostrarCarrinho();

</script>

</body>
</html>
