<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Armarinho São Paulo</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #111111, #2d2d2d);
            color: white;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            color: #ffd700;
            font-size: 2rem;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffd700;
        }

        .banner {
            text-align: center;
            padding: 100px 20px;
        }

        .banner h2 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .banner p {
            font-size: 1.2rem;
            margin-bottom: 35px;
            color: #e0e0e0;
        }

        .banner button {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background-color: #ffd700;
            color: black;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .banner button:hover {
            background-color: white;
            transform: scale(1.05);
        }

        .produtos {
            padding: 60px 40px;
        }

        .produtos h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #ffd700;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .card:hover {
            transform: translateY(-8px);
            background-color: rgba(255,255,255,0.12);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
        }

        .card h3 {
            margin-top: 15px;
            color: #ffd700;
            font-size: 1.5rem;
        }

        .card p {
            margin: 15px 0;
            font-size: 1.2rem;
        }

        .card button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background-color: #ffd700;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .card button:hover {
            background-color: white;
            transform: scale(1.05);
        }

        footer {
            margin-top: 50px;
            text-align: center;
            padding: 25px;
            background-color: rgba(255,255,255,0.05);
            color: #cccccc;
        }

        @media(max-width: 768px) {

            header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .banner h2 {
                font-size: 2.2rem;
            }

        }

    </style>
</head>

<body>

    <!-- MENU -->
    <header>

        <div class="logo">
            <h1>Armarinho <br> São Paulo</h1>
        </div>

        <nav>
            <a href="index.html">Início</a>
            <a href="produtos.html">Produtos</a>
            <a href="categorias.html">Categorias</a>
            <a href="contato.html">Contato</a>
            <a href="carrinho.html">Carrinho</a>
        </nav>

    </header>

    <!-- BANNER -->
    <section class="banner">

        <h2>Tudo para costura e artesanato</h2>

        <p>
            Linhas, tecidos, botões, agulhas e muito mais.
        </p>

        <button onclick="window.location.href='produtos.html'">
            Ver Produtos
        </button>

    </section>

    <!-- PRODUTOS -->
    <section class="produtos">

        <h2>Produtos em Destaque</h2>

        <div class="cards">

            <!-- CARD 1 -->
            <div class="card">

                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHZEYckuSWrWgwjUf0VuA1EyzlLDOpBhVHNg&s" alt="Linha">

                <h3>Linha Azul</h3>

                <p>R$ 5,50</p>

                <button onclick="adicionarCarrinho('Linha Azul', 5.50)">
                    Comprar
                </button>

            </div>

            <!-- CARD 2 -->
            <div class="card">

                <img src="https://www.copatmalhas.com.br/wp-content/uploads/2020/01/acapa-7-1024x1024.jpg" alt="Tecido">

                <h3>Tecido Algodão</h3>

                <p>R$ 25,00</p>

                <button onclick="adicionarCarrinho('Tecido Algodão', 25.00)">
                    Comprar
                </button>

            </div>

            <!-- CARD 3 -->
            <div class="card">

                <img src="https://storage.moovin.store/main/d41fe742-4c55-4ff3-94e1-1ada435d64a7/285581?v=1753998632" alt="Botão">

                <h3>Botão Branco</h3>

                <p>R$ 1,50</p>

                <button onclick="adicionarCarrinho('Botão Branco', 1.50)">
                    Comprar
                </button>

            </div>

        </div>

    </section>

    <!-- RODAPÉ -->
    <footer>

        <p>
            © 2026 Armarinho São Paulo - Todos os direitos reservados
        </p>

    </footer>

    <script>

        function adicionarCarrinho(nome, preco) {

            let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

            carrinho.push({
                nome: nome,
                preco: preco
            });

            localStorage.setItem('carrinho', JSON.stringify(carrinho));

            alert(nome + " adicionado ao carrinho!");

        }

    </script>

</body>

</html>
